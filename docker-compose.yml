version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cleanarch-api
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=CleanArchDb;Username=postgres;Password=Admin@123
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - cleanarch-network

  postgres:
    image: postgres:16
    container_name: cleanarch-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Admin@123
      POSTGRES_DB: CleanArchDb
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cleanarch-network

volumes:
  postgres-data:

networks:
  cleanarch-network:
    driver: bridge